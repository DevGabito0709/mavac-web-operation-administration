# Solo PostgreSQL (desarrollo local). Ejecutar desde la raíz del proyecto:
#   docker compose -f docker/docker-compose.yml up -d
services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: web_proyectus
    volumes:
      - ../db_data:/var/lib/postgresql/data
